    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center mb-4">
                <h1 class="display-4 fw-bold">Get In Touch</h1>
                <p class="lead text-muted">I would love to hear from you! Whether it's about product development, real estate, or just to say hello, feel free to reach out.</p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-4 mb-4">
                <div class="p-4 bg-primary text-white rounded shadow-sm h-100">
                    <h4 class="mb-4">Contact Info</h4>
                    <p><i class="bi bi-geo-alt-fill me-2"></i> Provo, Utah / Idaho</p>
                    <p><i class="bi bi-envelope-fill me-2"></i> alliehipwell@gmail.com</p>
                    <p><i class="bi bi-linkedin me-2"></i> <a href="https://www.linkedin.com/in/allie-hipwell-598624403" class="text-white text-decoration-none" target="_blank">LinkedIn Profile</a></p>
                    <hr class="border-light">
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="p-4 bg-white border rounded shadow-sm">
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" placeholder="Your Name">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea class="form-control" id="message" rows="5" placeholder="How can I help you?"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
